<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#0D0D0D;color:#F0EDE6;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top)}
.sg{font-family:'Space Grotesk',sans-serif}
@keyframes checkPop{0%{transform:scale(.8)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes completeBanner{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.header{padding:20px 20px 0;border-bottom:1px solid transparent}
.header-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.day-label{font-size:11px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:2px}
.date-big{font-size:28px;font-weight:700}
.workout-type{font-size:13px;font-weight:600;letter-spacing:1px}
.workout-sub{font-size:11px;color:#777;letter-spacing:1px}
.week-strip{display:flex;gap:4px;padding-bottom:16px;justify-content:space-between}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;background:transparent;border:1.5px solid transparent;border-radius:10px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none}
.week-day-name{font-size:10px;color:#555;letter-spacing:1px}
.week-day-num{font-size:15px;font-weight:400}
.week-day-dot{width:6px;height:6px;border-radius:50%;background:transparent}
.progress-section{padding:16px 20px 8px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:11px;color:#666;letter-spacing:2px;text-transform:uppercase}
.progress-count{font-size:13px;font-weight:600}
.progress-track{height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.complete-banner{margin:8px 20px;padding:12px 16px;background:linear-gradient(135deg,#5A7D4F15,#7BAF6E15);border:1px solid #5A7D4F40;border-radius:12px;text-align:center;animation:completeBanner .4s ease-out;display:none}
.complete-banner.show{display:block}
.complete-text{font-size:14px;font-weight:600;color:#7BAF6E}
.exercises{padding:8px 20px 100px}
.exercise{margin-bottom:8px;background:#141414;border:1px solid #1E1E1E;border-radius:14px;overflow:hidden;animation:slideIn .3s ease-out both;transition:border-color .3s,background .3s}
.exercise.done{background:#5A7D4F0A;border-color:#5A7D4F30}
.exercise-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:none;border:none;cursor:pointer;color:#F0EDE6;-webkit-appearance:none;appearance:none;outline:none;font-family:inherit}
.exercise-left{display:flex;align-items:center;gap:12px}
.exercise-icon{font-size:20px}
.exercise-name{font-size:14px;font-weight:600;text-align:left}
.exercise-detail{font-size:11px;color:#666;margin-top:2px;letter-spacing:.5px;text-align:left}
.exercise-right{display:flex;align-items:center;gap:10px}
.exercise-count{font-size:12px;color:#555;font-weight:500}
.exercise-arrow{font-size:12px;color:#444;transition:transform .2s;display:inline-block}
.exercise-arrow.open{transform:rotate(180deg)}
.sets-container{padding:0 16px 14px;display:none;flex-direction:column;gap:6px;animation:slideIn .2s ease-out}
.sets-container.open{display:flex}
.set-btn{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#0D0D0D;border:1px solid #222;border-radius:10px;cursor:pointer;transition:all .2s;color:#F0EDE6;width:100%;-webkit-appearance:none;appearance:none;outline:none;font-family:inherit}
.set-check{width:26px;height:26px;border-radius:8px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.set-label{font-size:13px;font-weight:500;color:#CCC;text-align:left}
.set-detail{font-size:11px;color:#555;margin-left:8px}
.set-btn.checked .set-label{color:#777;text-decoration:line-through;text-decoration-color:#55555580}
.set-btn.checked .set-check{animation:checkPop .3s ease-out}
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100}
.confetti{position:absolute;top:-20px;border-radius:50%}
</style>
</head>
<body>

<div id="confetti-layer" class="confetti-container" style="display:none"></div>

<div class="header" id="header">
  <div class="header-row">
    <div>
      <div class="day-label" id="day-name"></div>
      <div class="date-big sg" id="date-display"></div>
    </div>
    <div style="text-align:right">
      <div class="workout-type sg" id="workout-label"></div>
      <div class="workout-sub" id="workout-sub"></div>
    </div>
  </div>
  <div class="week-strip" id="week-strip"></div>
</div>

<div class="progress-section">
  <div class="progress-row">
    <span class="progress-label">Progress</span>
    <span class="progress-count" id="progress-count"></span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div class="complete-banner" id="complete-banner">
  <span class="complete-text sg">Workout Complete ✓</span>
</div>

<div class="exercises" id="exercises"></div>

<script>
const WORKOUTS = {
  A: {
    label: "Day A", subtitle: "Push + Quads", color: "#E85D3A",
    exercises: [
      { name: "Run / Walk", sets: 1, detail: "5 miles", icon: "🏃" },
      { name: "Barbell Bench Press", sets: 3, detail: "8-10 reps", icon: "🏋️" },
      { name: "Overhead Press", sets: 3, detail: "8-10 reps", icon: "🏋️" },
      { name: "Dumbbell Flyes", sets: 3, detail: "12-15 reps", icon: "🦋" },
      { name: "Barbell Squat", sets: 3, detail: "8-10 reps", icon: "🦵" },
      { name: "Dumbbell Curls", sets: 3, detail: "10-12 reps", icon: "💪" }
    ]
  },
  B: {
    label: "Day B", subtitle: "Pull + Hinge", color: "#2D7DD2",
    exercises: [
      { name: "Run / Walk", sets: 1, detail: "5 miles", icon: "🏃" },
      { name: "Hex Bar Deadlift", sets: 3, detail: "6-8 reps", icon: "🏋️" },
      { name: "Cable Lat Pulldowns", sets: 3, detail: "10-12 reps", icon: "🔽" },
      { name: "Cable Rows", sets: 3, detail: "10-12 reps", icon: "🚣" },
      { name: "Dumbbell Rows", sets: 3, detail: "10-12 ea. arm", icon: "🏋️" },
      { name: "Cable Face Pulls", sets: 3, detail: "15 reps", icon: "🎯" }
    ]
  },
  R: {
    label: "Rest Day", subtitle: "Recovery", color: "#5A7D4F",
    exercises: [
      { name: "Run / Walk (optional)", sets: 1, detail: "5 miles easy pace", icon: "🚶" }
    ]
  }
};

const CYCLE = ["A","B","R","A","B","R","A"];
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_COLORS = { A: "#E85D3A", B: "#2D7DD2", R: "#5A7D4F" };

let selectedDate = new Date();
let expandedExercise = null;
let completedSets = {};
let startDate;

function dateKey(d) {
  return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
}

function loadData() {
  try {
    const s = localStorage.getItem("workout-sets");
    if (s) completedSets = JSON.parse(s);
  } catch(e) {}
  try {
    const sd = localStorage.getItem("workout-start");
    startDate = sd ? new Date(sd) : new Date();
  } catch(e) {
    startDate = new Date();
  }
  startDate.setHours(0,0,0,0);
  localStorage.setItem("workout-start", startDate.toISOString());
}

function saveData() {
  localStorage.setItem("workout-sets", JSON.stringify(completedSets));
}

function getDayType(d) {
  const diff = Math.floor((d - startDate) / 864e5);
  const idx = ((diff % CYCLE.length) + CYCLE.length) % CYCLE.length;
  return CYCLE[idx];
}

function getWeekStart(d) {
  const w = new Date(d);
  w.setDate(w.getDate() - w.getDay());
  w.setHours(0,0,0,0);
  return w;
}

function isSetDone(exIdx, setIdx) {
  const dk = dateKey(selectedDate);
  return !!(completedSets[dk] && completedSets[dk][exIdx + "-" + setIdx]);
}

function toggleSet(exIdx, setIdx) {
  const dk = dateKey(selectedDate);
  if (!completedSets[dk]) completedSets[dk] = {};
  const key = exIdx + "-" + setIdx;
  if (completedSets[dk][key]) {
    delete completedSets[dk][key];
  } else {
    completedSets[dk][key] = true;
  }
  saveData();
  render();
}

function countDone(exIdx, sets) {
  let n = 0;
  for (let i = 0; i < sets; i++) if (isSetDone(exIdx, i)) n++;
  return n;
}

function showConfetti() {
  const el = document.getElementById("confetti-layer");
  el.innerHTML = "";
  el.style.display = "block";
  const colors = ["#E85D3A","#2D7DD2","#5A7D4F","#F0EDE6","#FFD700"];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement("div");
    const size = 8 + Math.random() * 8;
    c.style.cssText = `position:absolute;top:-20px;left:${Math.random()*100}%;width:${size}px;height:${size}px;border-radius:${Math.random()>.5?"50%":"2px"};background:${colors[Math.floor(Math.random()*5)]};animation:confettiDrop ${1.5+Math.random()*1.5}s ease-in forwards;animation-delay:${Math.random()*.5}s`;
    el.appendChild(c);
  }
  setTimeout(() => { el.style.display = "none"; }, 2500);
}

let wasComplete = false;

function render() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dayType = getDayType(selectedDate);
  const workout = WORKOUTS[dayType];
  const color = workout.color;
  const dk = dateKey(selectedDate);

  // Header
  document.getElementById("header").style.borderBottomColor = color + "22";
  document.getElementById("day-name").textContent = DAY_NAMES[selectedDate.getDay()];
  const dd = document.getElementById("date-display");
  dd.textContent = MONTHS[selectedDate.getMonth()] + " " + selectedDate.getDate();
  dd.style.color = color;
  document.getElementById("workout-label").textContent = workout.label;
  document.getElementById("workout-label").style.color = color;
  document.getElementById("workout-sub").textContent = workout.subtitle;

  // Week strip
  const ws = getWeekStart(selectedDate);
  const strip = document.getElementById("week-strip");
  strip.innerHTML = "";
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const dtype = getDayType(d);
    const sel = dateKey(d) === dateKey(selectedDate);
    const tod = dateKey(d) === dateKey(today);
    const dc = DAY_COLORS[dtype];

    const btn = document.createElement("button");
    btn.className = "week-day";
    if (sel) {
      btn.style.background = dc + "20";
      btn.style.borderColor = dc + "60";
    }
    btn.innerHTML = `
      <span class="week-day-name">${DAY_NAMES[d.getDay()].slice(0,2)}</span>
      <span class="week-day-num sg" style="font-weight:${sel?700:400};color:${sel?dc:"#888"}">${d.getDate()}</span>
      <span class="week-day-dot" style="background:${tod?dc:"transparent"}"></span>
    `;
    const capturedDate = new Date(d);
    btn.addEventListener("click", () => {
      selectedDate = capturedDate;
      expandedExercise = null;
      render();
    });
    strip.appendChild(btn);
  }

  // Progress
  const totalSets = workout.exercises.reduce((s, e) => s + e.sets, 0);
  let completedCount = 0;
  if (completedSets[dk]) completedCount = Object.keys(completedSets[dk]).length;
  const progress = totalSets > 0 ? completedCount / totalSets : 0;
  const isComplete = completedCount === totalSets && totalSets > 0;

  document.getElementById("progress-count").textContent = completedCount + "/" + totalSets;
  document.getElementById("progress-count").style.color = isComplete ? "#5A7D4F" : color;
  const fill = document.getElementById("progress-fill");
  fill.style.width = (progress * 100) + "%";
  fill.style.background = isComplete ? "linear-gradient(90deg,#5A7D4F,#7BAF6E)" : `linear-gradient(90deg,${color}CC,${color})`;
  fill.style.animation = progress > 0 && !isComplete ? "progressPulse 2s ease infinite" : "none";

  const banner = document.getElementById("complete-banner");
  banner.className = "complete-banner" + (isComplete ? " show" : "");

  if (isComplete && !wasComplete) showConfetti();
  wasComplete = isComplete;

  // Exercises
  const container = document.getElementById("exercises");
  container.innerHTML = "";
  workout.exercises.forEach((ex, exIdx) => {
    const done = countDone(exIdx, ex.sets);
    const exComplete = done === ex.sets;
    const isExpanded = expandedExercise === exIdx;

    const div = document.createElement("div");
    div.className = "exercise" + (exComplete ? " done" : "");
    div.style.animationDelay = (exIdx * 0.05) + "s";

    const header = document.createElement("button");
    header.className = "exercise-header";
    header.innerHTML = `
      <div class="exercise-left">
        <span class="exercise-icon">${ex.icon}</span>
        <div>
          <div class="exercise-name sg" style="color:${exComplete?"#7BAF6E":"#F0EDE6"};text-decoration:${exComplete?"line-through":"none"};text-decoration-color:#5A7D4F60">${ex.name}</div>
          <div class="exercise-detail">${ex.sets > 1 ? ex.sets + " sets · " : ""}${ex.detail}</div>
        </div>
      </div>
      <div class="exercise-right">
        ${ex.sets > 1 ? `<span class="exercise-count" style="color:${exComplete?"#5A7D4F":"#555"}">${done}/${ex.sets}</span>` : ""}
        <span class="exercise-arrow${isExpanded?" open":""}">▼</span>
      </div>
    `;
    header.addEventListener("click", () => {
      expandedExercise = isExpanded ? null : exIdx;
      render();
    });
    div.appendChild(header);

    const setsDiv = document.createElement("div");
    setsDiv.className = "sets-container" + (isExpanded ? " open" : "");

    for (let si = 0; si < ex.sets; si++) {
      const checked = isSetDone(exIdx, si);
      const btn = document.createElement("button");
      btn.className = "set-btn" + (checked ? " checked" : "");
      if (checked) {
        btn.style.background = color + "10";
        btn.style.borderColor = color + "40";
      }

      btn.innerHTML = `
        <div class="set-check" style="border-color:${checked?color:"#333"};background:${checked?color:"transparent"}">
          ${checked ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7L6 10L11 4" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ""}
        </div>
        <div style="text-align:left">
          <span class="set-label">${ex.sets === 1 ? ex.detail : "Set " + (si + 1)}</span>
          ${ex.sets > 1 ? `<span class="set-detail">${ex.detail}</span>` : ""}
        </div>
      `;

      const capturedEx = exIdx;
      const capturedSet = si;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleSet(capturedEx, capturedSet);
      });
      setsDiv.appendChild(btn);
    }

    div.appendChild(setsDiv);
    container.appendChild(div);
  });
}

// Init
loadData();
render();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
